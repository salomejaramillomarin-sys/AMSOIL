<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Factura - AMSOIL</title>
  <link rel="stylesheet" href="css/principal.css" />
  <link rel="stylesheet" href="css/crearfac.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar__logo">
      <img src="font/amsoil.png" alt="AMSOIL Logo">
    </div>

    <nav class="navbar__nav">
      <a class="nav-btn" href="principal.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l6 3.46a2 2 0 0 0 2 0l6-3.46A2 2 0 0 0 21 16z"/></svg>
        Productos
      </a>
      <a class="nav-btn" href="principal.html?view=historial">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historial
      </a>
      <a class="nav-btn nav-btn--active" href="crearfac.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Crear Factura
      </a>
      <a class="nav-btn" href="principal.html?view=agregar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Agregar Producto
      </a>
      <a class="nav-btn" href="principal.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Eliminar Producto
      </a>
      <a class="nav-btn" href="principal.html?view=ajustes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Ajustes
      </a>
    </nav>
  </header>

  <main class="page-content">
    <section class="factura-header">
      <h2 class="factura-title">Crear Factura</h2>
      <div id="fecha-hora"></div>
      <button class="btn-agregar-prod" type="button" onclick="abrirModal()">
        + Agregar Producto
      </button>
    </section>

    <div class="factura-table-wrapper">
      <table class="factura-table" id="tabla-factura">
        <thead>
          <tr>
            <th>Código</th>
            <th>Cant.</th>
            <th>Cod. Reciclaje</th>
            <th>Deriv. Petróleo</th>
            <th>Cod. Grasa</th>
            <th>IVU</th>
            <th>Costo</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="cuerpo-factura"></tbody>
      </table>
    </div>

    <div class="factura-footer">
      <button class="btn-guardar-factura" type="button" onclick="guardarFactura()">
        Guardar Factura
      </button>
    </div>
  </main>

  <div id="modal-producto" class="modal">
    <div class="modal-content">
      <h2>Agregar Producto</h2>

      <label for="input-codigo">Código:</label>
      <input
        type="text"
        id="input-codigo"
        placeholder="Ej: ABC2D"
        style="text-transform: uppercase;"
        oninput="buscarProducto()"
      >

      <p id="msg-no-encontrado" class="msg-error">Producto no encontrado.</p>

      <label for="input-cantidad">¿Cuántas unidades?</label>
      <input type="number" id="input-cantidad" placeholder="0" min="1">

      <div class="modal-actions">
        <button type="button" class="btn-modal-agregar" onclick="procesarProducto()">Agregar Producto</button>
        <button type="button" class="btn-modal-cancelar" onclick="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast-guardado" class="toast">✓ Factura guardada en el Historial</div>

  <div class="wave-container">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" height="120">
      <path d="M0,80 C360,140 720,20 1440,90 L1440,120 L0,120 Z" fill="#C8102E"/>
      <path d="M0,100 C400,60 900,130 1440,80 L1440,120 L0,120 Z" fill="#003087" opacity="0.85"/>
    </svg>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/crearfac.js"></script>
</body>
</html>
